version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./nextjs_space:/app
      - /app/node_modules
      - /app/.next
    command: yarn dev
    restart: unless-stopped
